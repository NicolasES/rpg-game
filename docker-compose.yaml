services:
  backend:
    build:
      context: .
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "3000:3000"
    command: sleep infinity
    environment:
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root
      - DATABASE_NAME=rpg-game
      - DATABASE_URL=mysql://root:root@mysql:3306/rpg-game
  mysql:
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rpg-game
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
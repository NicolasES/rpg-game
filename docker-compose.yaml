services:
  backend:
    build:
      context: .
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "3000:3000"
    command: sleep infinity
    # environment:
    #   - NODE_ENV=development
    #   - PORT=3000
    #   - DB_HOST=db
    #   - DB_PORT=5432
    #   - DB_USER=postgres
    #   - DB_PASSWORD=123456
    #   - DB_NAME=app
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rpg-game
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: